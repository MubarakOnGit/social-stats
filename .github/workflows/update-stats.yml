name: Update Social Stats

permissions:
  contents: write

on:
  #schedule:
   # - cron: '0 0 * * *'  # Midnight UTC daily (saves API calls)
  workflow_dispatch:      # Manual button for testing

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Followers Only
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: |
          cat > fetch-stats.js << 'EOF'
          const fs = require('fs');

          async function fetchWithTimeout(url, options, timeout = 15000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
              const response = await fetch(url, { ...options, signal: controller.signal });
              clearTimeout(id);
              return response;
            } catch (error) {
              clearTimeout(id);
              throw error;
            }
          }

          // YOUTUBE - Only subscribers
          async function fetchYouTube() {
            try {
              const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${process.env.YOUTUBE_CHANNEL_ID}&key=${process.env.YOUTUBE_API_KEY}`;
              const res = await fetchWithTimeout(url, {}, 10000);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              if (!data.items?.length) throw new Error('No channel');
              return parseInt(data.items[0].statistics.subscriberCount);
            } catch (e) {
              console.error('YouTube:', e.message);
              return null;
            }
          }

          // INSTAGRAM - Only followers (RapidAPI)
          async function fetchInstagram() {
            try {
              const url = 'https://instagram120.p.rapidapi.com/api/instagram/userInfo';
              const res = await fetchWithTimeout(url, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-rapidapi-host': 'instagram120.p.rapidapi.com',
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY
                },
                body: JSON.stringify({ username: process.env.INSTAGRAM_USERNAME })
              }, 15000);
              
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              
              // Extract only follower count
              let user = null;
              if (Array.isArray(data.result) && data.result.length > 0) {
                user = data.result[0].user;
              } else if (data.result?.user) {
                user = data.result.user;
              }
              
              if (!user?.follower_count) throw new Error('No followers data');
              return parseInt(user.follower_count);
            } catch (e) {
              console.error('Instagram:', e.message);
              return null;
            }
          }

          // TIKTOK - Only followers (RapidAPI)
          async function fetchTikTok() {
            try {
              const url = `https://tiktok-api23.p.rapidapi.com/api/user/info?uniqueId=${process.env.TIKTOK_USERNAME}`;
              const res = await fetchWithTimeout(url, {
                method: 'GET',
                headers: {
                  'x-rapidapi-host': 'tiktok-api23.p.rapidapi.com',
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY
                }
              }, 15000);
              
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              
              if (!data.userInfo?.stats?.followerCount) throw new Error('No followers data');
              return parseInt(data.userInfo.stats.followerCount);
            } catch (e) {
              console.error('TikTok:', e.message);
              return null;
            }
          }

          function formatNumber(num) {
            if (!num || isNaN(num)) return '0';
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
          }

          async function main() {
            console.log('Fetching followers only...');
            console.log('Time:', new Date().toISOString());
            
            // Fetch all three
            const [yt, ig, tt] = await Promise.all([
              fetchYouTube(),
              fetchInstagram(),
              fetchTikTok()
            ]);

            // Minimal data structure - only what website needs
            const stats = {
              updated_at: new Date().toISOString(),
              counts: {
                youtube: yt || 0,
                instagram: ig || 0,
                tiktok: tt || 0
              },
              display: {
                youtube: formatNumber(yt || 0),
                instagram: formatNumber(ig || 0),
                tiktok: formatNumber(tt || 0)
              }
            };

            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
            console.log('Saved:', stats.display);
            
            // Fail only if all failed
            if (!yt && !ig && !tt) {
              console.error('All failed');
              process.exit(1);
            }
          }

          main();
          EOF

          node fetch-stats.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f stats.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "📊 Daily followers update - $(date '+%Y-%m-%d')" && git push)
