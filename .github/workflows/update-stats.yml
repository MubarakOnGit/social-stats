name: Update Social Stats

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:      # Manual button

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and Update Stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: |
          cat > fetch-stats.js << 'EOF'
          const fs = require('fs');

          async function fetchWithTimeout(url, options, timeout = 15000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
              const response = await fetch(url, { ...options, signal: controller.signal });
              clearTimeout(id);
              return response;
            } catch (error) {
              clearTimeout(id);
              throw error;
            }
          }

          // 1. YOUTUBE - Official API
          async function fetchYouTube() {
            try {
              const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${process.env.YOUTUBE_CHANNEL_ID}&key=${process.env.YOUTUBE_API_KEY}`;
              console.log('📺 YouTube: Fetching...');
              
              const res = await fetchWithTimeout(url, {}, 10000);
              console.log('📺 YouTube: Status', res.status);
              
              if (!res.ok) {
                const text = await res.text();
                console.error('📺 YouTube Error:', text.substring(0, 200));
                throw new Error(`HTTP ${res.status}`);
              }
              
              const data = await res.json();
              if (!data.items || data.items.length === 0) {
                throw new Error('No channel found');
              }
              
              const stats = data.items[0].statistics;
              const result = {
                subscribers: parseInt(stats.subscriberCount),
                views: parseInt(stats.viewCount),
                videos: parseInt(stats.videoCount)
              };
              console.log('📺 YouTube: ✅', result.subscribers, 'subscribers');
              return result;
            } catch (e) {
              console.error('📺 YouTube: ❌', e.message);
              return null;
            }
          }

          // 2. INSTAGRAM - RapidAPI (instagram120.p.rapidapi.com)
          async function fetchInstagram() {
            try {
              const url = 'https://instagram120.p.rapidapi.com/api/instagram/userInfo';
              console.log('📸 Instagram: Fetching...');
              
              const res = await fetchWithTimeout(url, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-rapidapi-host': 'instagram120.p.rapidapi.com',
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY
                },
                body: JSON.stringify({
                  username: process.env.INSTAGRAM_USERNAME
                })
              }, 15000);
              
              console.log('📸 Instagram: Status', res.status);
              
              if (!res.ok) {
                const text = await res.text();
                console.error('📸 Instagram Error:', text.substring(0, 200));
                throw new Error(`HTTP ${res.status}`);
              }
              
              const data = await res.json();
              
              // Parse response - follower_count is at result.user.follower_count
              if (!data.result || !data.result.user) {
                console.log('📸 Instagram: Response keys:', Object.keys(data));
                throw new Error('Unexpected response format');
              }
              
              const user = data.result.user;
              const result = {
                followers: parseInt(user.follower_count),
                following: parseInt(user.following_count),
                posts: parseInt(user.media_count),
                username: user.username,
                is_verified: user.is_verified
              };
              console.log('📸 Instagram: ✅', result.followers, 'followers');
              return result;
            } catch (e) {
              console.error('📸 Instagram: ❌', e.message);
              return null;
            }
          }

          // 3. TIKTOK - RapidAPI (tiktok-api23.p.rapidapi.com)
          async function fetchTikTok() {
            try {
              const url = `https://tiktok-api23.p.rapidapi.com/api/user/info?uniqueId=${process.env.TIKTOK_USERNAME}`;
              console.log('🎵 TikTok: Fetching...');
              
              const res = await fetchWithTimeout(url, {
                method: 'GET',
                headers: {
                  'x-rapidapi-host': 'tiktok-api23.p.rapidapi.com',
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY
                }
              }, 15000);
              
              console.log('🎵 TikTok: Status', res.status);
              
              if (!res.ok) {
                const text = await res.text();
                console.error('🎵 TikTok Error:', text.substring(0, 200));
                throw new Error(`HTTP ${res.status}`);
              }
              
              const data = await res.json();
              
              // Parse response - followerCount is at userInfo.stats.followerCount
              if (!data.userInfo || !data.userInfo.stats) {
                console.log('🎵 TikTok: Response keys:', Object.keys(data));
                throw new Error('Unexpected response format');
              }
              
              const stats = data.userInfo.stats;
              const user = data.userInfo.user;
              const result = {
                followers: parseInt(stats.followerCount),
                following: parseInt(stats.followingCount),
                likes: parseInt(stats.heartCount),
                videos: parseInt(stats.videoCount),
                username: user.uniqueId,
                is_verified: user.verified
              };
              console.log('🎵 TikTok: ✅', result.followers, 'followers');
              return result;
            } catch (e) {
              console.error('🎵 TikTok: ❌', e.message);
              return null;
            }
          }

          function formatNumber(num) {
            if (!num || isNaN(num)) return 'N/A';
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toLocaleString();
          }

          async function main() {
            console.log('🔍 Fetching social stats...');
            console.log('Time:', new Date().toISOString());
            console.log('');
            
            // Fetch all three
            const [yt, ig, tt] = await Promise.all([
              fetchYouTube(),
              fetchInstagram(),
              fetchTikTok()
            ]);

            const stats = {
              updated_at: new Date().toISOString(),
              sources: {
                youtube: yt ? 'api' : 'failed',
                instagram: ig ? 'rapidapi' : 'failed',
                tiktok: tt ? 'rapidapi' : 'failed'
              },
              data: {
                youtube: yt,
                instagram: ig,
                tiktok: tt
              },
              display: {
                youtube: yt ? formatNumber(yt.subscribers) : 'N/A',
                instagram: ig ? formatNumber(ig.followers) : 'N/A',
                tiktok: tt ? formatNumber(tt.followers) : 'N/A'
              }
            };

            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
            
            console.log('');
            console.log('📊 FINAL RESULT:');
            console.log(JSON.stringify(stats.display, null, 2));
            console.log('');
            
            // Success if at least YouTube works (most reliable)
            if (!yt) {
              console.error('❌ YouTube failed - check API key');
              process.exit(1);
            }
            
            if (!ig || !tt) {
              console.log('⚠️  Some APIs failed, but YouTube works - continuing');
            }
          }

          main().catch(err => {
            console.error('Fatal error:', err);
            process.exit(1);
          });
          EOF

          node fetch-stats.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ ! -f stats.json ]; then
            echo "❌ stats.json not created"
            exit 1
          fi
          
          if git diff --quiet stats.json; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi
          
          git add stats.json
          git commit -m "📊 Update stats - $(date '+%Y-%m-%d %H:%M UTC')"
          git push
