name: Update Social Stats

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and Update Stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: |
          cat > fetch-stats.js << 'EOF'
          const fs = require('fs');

          async function fetchWithTimeout(url, options, timeout = 15000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
              const response = await fetch(url, { ...options, signal: controller.signal });
              clearTimeout(id);
              return response;
            } catch (error) {
              clearTimeout(id);
              throw error;
            }
          }

          async function fetchYouTube() {
            try {
              const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${process.env.YOUTUBE_CHANNEL_ID}&key=${process.env.YOUTUBE_API_KEY}`;
              console.log('📺 YouTube: Fetching...');
              const res = await fetchWithTimeout(url, {}, 10000);
              console.log('📺 YouTube: Status', res.status);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              if (!data.items || data.items.length === 0) throw new Error('No channel found');
              const stats = data.items[0].statistics;
              return {
                subscribers: parseInt(stats.subscriberCount),
                views: parseInt(stats.viewCount),
                videos: parseInt(stats.videoCount)
              };
            } catch (e) {
              console.error('📺 YouTube: ❌', e.message);
              return null;
            }
          }

          async function fetchInstagram() {
            try {
              const url = 'https://instagram120.p.rapidapi.com/api/instagram/userInfo';
              console.log('📸 Instagram: Fetching...');
              const res = await fetchWithTimeout(url, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'x-rapidapi-host': 'instagram120.p.rapidapi.com',
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY
                },
                body: JSON.stringify({ username: process.env.INSTAGRAM_USERNAME })
              }, 15000);
              console.log('📸 Instagram: Status', res.status);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              
              // Debug: log full response
              console.log('📸 Instagram: Response preview:', JSON.stringify(data).substring(0, 500));
              
              // Find user data in various formats
              let user = data.result?.user || data.result || data.user;
              if (!user) throw new Error('User data not found');
              
              return {
                followers: parseInt(user.follower_count || 0),
                following: parseInt(user.following_count || 0),
                posts: parseInt(user.media_count || 0)
              };
            } catch (e) {
              console.error('📸 Instagram: ❌', e.message);
              return null;
            }
          }

          async function fetchTikTok() {
            try {
              const url = `https://tiktok-api23.p.rapidapi.com/api/user/info?uniqueId=${process.env.TIKTOK_USERNAME}`;
              console.log('🎵 TikTok: Fetching...');
              const res = await fetchWithTimeout(url, {
                method: 'GET',
                headers: {
                  'x-rapidapi-host': 'tiktok-api23.p.rapidapi.com',
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY
                }
              }, 15000);
              console.log('🎵 TikTok: Status', res.status);
              if (!res.ok) throw new Error(`HTTP ${res.status}`);
              const data = await res.json();
              if (!data.userInfo?.stats) throw new Error('No stats found');
              return {
                followers: parseInt(data.userInfo.stats.followerCount),
                following: parseInt(data.userInfo.stats.followingCount),
                likes: parseInt(data.userInfo.stats.heartCount),
                videos: parseInt(data.userInfo.stats.videoCount)
              };
            } catch (e) {
              console.error('🎵 TikTok: ❌', e.message);
              return null;
            }
          }

          function formatNumber(num) {
            if (!num || isNaN(num)) return 'N/A';
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toLocaleString();
          }

          async function main() {
            console.log('🔍 Fetching social stats...');
            const [yt, ig, tt] = await Promise.all([fetchYouTube(), fetchInstagram(), fetchTikTok()]);
            
            const stats = {
              updated_at: new Date().toISOString(),
              sources: {
                youtube: yt ? 'api' : 'failed',
                instagram: ig ? 'rapidapi' : 'failed',
                tiktok: tt ? 'rapidapi' : 'failed'
              },
              data: { youtube: yt, instagram: ig, tiktok: tt },
              display: {
                youtube: yt ? formatNumber(yt.subscribers) : 'N/A',
                instagram: ig ? formatNumber(ig.followers) : 'N/A',
                tiktok: tt ? formatNumber(tt.followers) : 'N/A'
              }
            };

            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
            console.log('📊 Result:', stats.display);
            
            if (!yt) process.exit(1);
          }

          main();
          EOF

          node fetch-stats.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f stats.json
          git diff --cached --quiet && echo "No changes" || (git commit -m "📊 Update stats - $(date '+%Y-%m-%d %H:%M UTC')" && git push)
