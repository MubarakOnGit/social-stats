name: Update Social Stats

on:
  schedule:
    - cron: '0 * * * *'  # Every hour (safe & free)
  workflow_dispatch:      # Manual trigger button

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch and Update Stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: |
          cat > fetch-stats.js << 'EOF'
          const fs = require('fs');
          
          async function fetchYouTube() {
            try {
              const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${process.env.YOUTUBE_CHANNEL_ID}&key=${process.env.YOUTUBE_API_KEY}`;
              const res = await fetch(url);
              const data = await res.json();
              return data.items[0].statistics.subscriberCount;
            } catch (e) {
              console.error('YouTube error:', e);
              return null;
            }
          }

          async function fetchInstagram() {
            try {
              // Method 1: RapidAPI free tier (100 requests/day)
              const url = `https://instagram-scraper-api2.p.rapidapi.com/v1/info?username_or_id_or_url=${process.env.INSTAGRAM_USERNAME}`;
              const res = await fetch(url, {
                headers: {
                  'x-rapidapi-key': process.env.RAPIDAPI_KEY || '',
                  'x-rapidapi-host': 'instagram-scraper-api2.p.rapidapi.com'
                }
              });
              if (!res.ok) throw new Error('RapidAPI failed');
              const data = await res.json();
              return data.data.follower_count;
            } catch (e) {
              console.log('RapidAPI failed, trying backup...');
              try {
                // Method 2: Free public scraper (less reliable but free)
                const url = `https://www.instagram.com/${process.env.INSTAGRAM_USERNAME}/?__a=1&__d=dis`;
                const res = await fetch(url, {
                  headers: {
                    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                  }
                });
                const text = await res.text();
                // Extract from HTML (fragile but free)
                const match = text.match(/"edge_followed_by":{"count":(\d+)}/);
                return match ? match[1] : null;
              } catch (e2) {
                console.error('Instagram error:', e2);
                return null;
              }
            }
          }

          async function fetchTikTok() {
            try {
              // Free TikTok scraper (no API key needed)
              const url = `https://www.tiktok.com/@${process.env.TIKTOK_USERNAME}`;
              const res = await fetch(url, {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                }
              });
              const text = await res.text();
              // Extract follower count from embedded JSON
              const match = text.match(/"followerCount":(\d+)/);
              return match ? match[1] : null;
            } catch (e) {
              console.error('TikTok error:', e);
              return null;
            }
          }

          async function main() {
            const [youtube, instagram, tiktok] = await Promise.all([
              fetchYouTube(),
              fetchInstagram(),
              fetchTikTok()
            ]);

            const stats = {
              updated_at: new Date().toISOString(),
              youtube: youtube ? parseInt(youtube) : null,
              instagram: instagram ? parseInt(instagram) : null,
              tiktok: tiktok ? parseInt(tiktok) : null,
              formatted: {
                youtube: youtube ? formatNumber(youtube) : 'N/A',
                instagram: instagram ? formatNumber(instagram) : 'N/A',
                tiktok: tiktok ? formatNumber(tiktok) : 'N/A'
              }
            };

            fs.writeFileSync('stats.json', JSON.stringify(stats, null, 2));
            console.log('Stats updated:', stats);
          }

          function formatNumber(num) {
            if (num >= 1000000) return (num/1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num/1000).toFixed(1) + 'K';
            return num.toString();
          }

          main();
          EOF

          node fetch-stats.js

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet stats.json; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add stats.json
          git commit -m "📊 Update social stats - $(date '+%Y-%m-%d %H:%M')"
          git push
